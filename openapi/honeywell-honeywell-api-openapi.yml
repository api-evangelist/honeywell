openapi: 3.1.0
info:
  title: Honeywell Forge API
  description: >-
    Honeywell provides developer APIs for building automation, industrial IoT, aerospace data, and connected building management. The Forge platform enables partners to integrate with Honeywell's industrial and commercial systems.
  version: '1.0'
  contact:
    name: Honeywell Developer Support
    url: https://developer.honeywell.com/
externalDocs:
  description: Documentation
  url: https://developer.honeywell.com/
servers:
  - url: https://api.honeywell.com
    description: Production
tags:
  - name: Industrial IoT
    description: Industrial IoT operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Industrial IoT
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

notes: Honeywell sells industrial / building / aerospace SaaS (Honeywell Forge, Connected Enterprise) on
  enterprise contracts. The FinOps shape is annual subscription + per-connected-asset fees + optional
  professional services. Meters below capture this shape; rates are bilateral and not publicly disclosed.
description: 'FOCUS-aligned FinOps stub for Honeywell. Enterprise subscription plus per-connected-asset
  metering, with rates set in the Master Services Agreement.'
sources:
  - https://www.honeywell.com/us/en
billingModel:
  pricingCategory: Subscription + Per-Asset (per enterprise agreement)
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Honeywell Forge / Connected Enterprise
  ServiceCategory: Industrial IoT / Building Automation / Aerospace
  ProviderName: Honeywell International Inc.
  PublisherName: Honeywell International Inc.
  InvoiceIssuerName: Honeywell International Inc.
  PricingCategory: Subscription + Per-Asset
  PricingUnit: asset
  BillingCurrency: USD
  ChargeCategory: Usage
principles:
  - name: Visibility
    description: Use Honeywell Forge dashboards, exports, and connected-asset inventory APIs to track
      asset count, ingestion volume, and module utilization. Reconcile against the annual entitlement.
  - name: Allocation
    description: Allocate Forge spend by site, building, plant, or tail number using the asset hierarchy
      that drives the contract's per-asset billing line.
  - name: Optimization
    description: Levers are deactivating unused assets / sites at renewal, consolidating Forge modules
      to bundle pricing, and tuning data ingestion intervals to stay within the entitlement tier.
  - name: Accountability
    description: Site / facility owners are accountable for their connected-asset footprint; central
      IT / OT owns the master agreement and renewal calendar.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
meters:
  - name: connected_assets
    description: Number of connected industrial / building / aerospace assets under management
    unit: asset
    aggregation: max
    dimensions:
      - tenant
      - site
      - asset_type
  - name: ingested_telemetry
    description: Volume of telemetry ingested into Forge
    unit: GB
    aggregation: sum
    dimensions:
      - tenant
      - site
      - asset_type
  - name: subscription_fee
    description: Annual subscription fee for Forge / Connected Enterprise modules
    unit: year
    aggregation: sum
    dimensions:
      - tenant
      - module
  - name: professional_services
    description: Honeywell Professional Services engagements
    unit: hour
    aggregation: sum
    dimensions:
      - tenant
      - engagement
apis:
  - name: Honeywell Forge
    baseURL: ''
    tags:
      - Building Automation
      - Industrial IoT
      - Manufacturing
    serviceName: Honeywell Forge
    serviceCategory: Industrial IoT / Building Automation / Aerospace
unitEconomics:
  - name: Cost per Connected Asset
    metric: subscription_fee / connected_assets
    target: per enterprise agreement
  - name: Cost per Site
    metric: subscription_fee / sites
    target: per enterprise agreement

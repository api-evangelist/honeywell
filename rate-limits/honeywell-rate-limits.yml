specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Honeywell
providerId: honeywell
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Aerospace
  - Building Automation
  - Industrial IoT
  - Manufacturing
  - Rate Limiting
notes: Honeywell does not publish public API rate limits. Honeywell Forge documentation is gated and could
  not be fetched at generation time. Limits, headers, and 429 / 503 behavior are governed by the enterprise
  subscription / Master Services Agreement.
sources:
  - https://www.honeywell.com/us/en
description: No public rate-limit documentation; controls live in the enterprise agreement / Forge tenant
  configuration.
limits:
  - tier: enterprise
    name: Forge Tenant Limit
    scope: tenant
    metric: varies
    limit: 'see Forge tenant configuration / enterprise agreement'
    applies:
      - Honeywell Forge
    notes: No publicly published numeric ceiling. Per-tenant limits are typically scaled to subscribed
      asset count.
policies:
  - name: Bilateral Disclosure
    description: All rate-limit and SLA terms are exchanged during enterprise onboarding under NDA.
  - name: Backoff Strategy
    description: Implement exponential backoff with jitter on 429 / 503 responses; consult the Forge tenant
      runbook for any documented Retry-After conventions.
  - name: Tenant Scaling
    description: Higher sustained throughput is provisioned as part of contract amendment when the
      connected-asset count or site footprint grows.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
